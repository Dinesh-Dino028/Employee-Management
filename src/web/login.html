<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url('BG.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            border-bottom: 2px solid rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-header text-center bg-primary text-white">
                        <h2>Login</h2>
                    </div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                            <div class="alert alert-danger mt-3" id="errorMessage" style="display: none;">Invalid
                                username or password. Please try again.</div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
       // const isOffline = process.env.IS_OFFLINE;
       const isOffline = typeof process !== 'undefined' && process.env.IS_OFFLINE === 'true';
       console.log(isOffline);

        const baseUrl = isOffline ? 'http://localhost:3000' : 'https://w1z04d5oz4.execute-api.ap-south-1.amazonaws.com/prod';
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', (event) => {
            event.preventDefault();

            const uname = document.getElementById('username').value;
            const pwd = document.getElementById('password').value;

            //get the login details and validation
            async function verifyEmployee() {
                try {
                    const response = await fetch(`${baseUrl}/employee/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            username: uname,
                            password: pwd
                        }),
                    });
                    if (response.ok) {
                        window.location.href = 'employee_form.html'; // Redirect to the Employee Registration form
                    } else {
                        document.getElementById('errorMessage').style.display = 'block';
                        document.getElementById('errorMessage').innerText = "Invalid username or password.";
                    }

                } catch (error) {
                    console.error('Error fetching employees:', error);
                    alert('Error fetching employees: ' + error);
                }
            }

            verifyEmployee(); // Call the function to process login
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
