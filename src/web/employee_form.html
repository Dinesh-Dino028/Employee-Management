<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    body {
        background-image: url('BG.webp');
        /* Replace with the actual path to the AWS-themed background image */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .card {
        background-color: rgba(255, 255, 255, 0.9);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .card-header {
        border-bottom: 2px solid rgba(0, 0, 0, 0.1);
    }
</style>

<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header text-center bg-primary text-white">
                        <h2>Employee Registration / Edit</h2>
                    </div>
                    <div class="card-body">
                        <form id="employeeForm">
                            <input type="hidden" id="employeeId" name="employeeId">
    
                            <div class="mb-3">
                                <label for="name" class="form-label">Name</label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
    
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
    
                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone</label>
                                <input type="text" class="form-control" id="phone" name="phone" required>
                            </div>
    
                            <div class="mb-3">
                                <label for="department" class="form-label">Department</label>
                                <input type="text" class="form-control" id="department" name="department" required>
                            </div>
    
                            <div class="mb-3">
                                <label for="designation" class="form-label">Designation</label>
                                <input type="text" class="form-control" id="designation" name="designation" required>
                            </div>
    
                            <button type="submit" class="btn btn-primary w-100">Save</button>
    
                            <div class="alert alert-success mt-3" id="successMessage" style="display: none;">Employee saved successfully!</div>
                            <div class="alert alert-danger mt-3" id="errorMessage" style="display: none;">Failed to save employee. Please try again.</div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    
        <div class="row justify-content-center mt-5">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header text-center bg-secondary text-white">
                        <h2>Employee List</h2>
                    </div>
                    <div class="card-body">
                        <table class="table table-bordered">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Department</th>
                                    <th>Designation</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="employeeList">
                                <!-- Employee rows will be added here dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        //const isOffline = process.env.IS_OFFLINE;
        const isOffline = typeof process !== 'undefined' && process.env.IS_OFFLINE === 'true';
        const baseUrl = isOffline ? 'http://localhost:3000' : 'https://w1z04d5oz4.execute-api.ap-south-1.amazonaws.com/prod';
        const form = document.getElementById('employeeForm');
        const employeeList = document.getElementById('employeeList');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
    
        let isEditMode = false;
    
        async function fetchEmployees() {
            try {
                const response = await fetch(`${baseUrl}/employee/list`);
                const employees = await response.json();
    
                employeeList.innerHTML = '';
                employees.forEach((employee) => {
                    const row = document.createElement('tr');
                    row.dataset.employee = JSON.stringify(employee);
                    row.innerHTML = `
                        <td>${employee.name}</td>
                        <td>${employee.email}</td>
                        <td>${employee.phone}</td>
                        <td>${employee.department}</td>
                        <td>${employee.designation}</td>
                        <td>
                            <button class="btn btn-warning btn-sm" onclick="loadEmployeeForEdit(this)">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteEmployee('${employee.id}')">Delete</button>
                        </td>
                    `;
                    employeeList.appendChild(row);
                });
            } catch (error) {
                console.error('Error fetching employees:', error);
            }
        }
    
        function loadEmployeeForEdit(button) {
            const row = button.closest('tr');
            const employee = JSON.parse(row.dataset.employee);
    
            // Populate the form with employee details
            document.getElementById('employeeId').value = employee.id;
            document.getElementById('name').value = employee.name;
            document.getElementById('email').value = employee.email;
            document.getElementById('phone').value = employee.phone;
            document.getElementById('department').value = employee.department;
            document.getElementById('designation').value = employee.designation;
    
            isEditMode = true;
        }
    
        async function deleteEmployee(id) {
            try {
                await fetch(`${baseUrl}/employee/delete/${id}`, {
                    method: 'DELETE'
                });
                fetchEmployees();
            } catch (error) {
                console.error('Error deleting employee:', error);
            }
        }
    
        form.addEventListener('submit', async (event) => {
            event.preventDefault();
    
            const id = document.getElementById('employeeId').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const department = document.getElementById('department').value;
            const designation = document.getElementById('designation').value;
    
            const payload = {
                name,
                email,
                phone,
                department,
                designation
            };
    
            try {
                if (isEditMode && id) {
                    // Update existing employee
                    await fetch(`${baseUrl}/employee/update/${id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });
                    isEditMode = false;
                } else {
                    // Add new employee
                    await fetch(`${baseUrl}/employee/add`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });
                }
    
                successMessage.style.display = 'block';
                errorMessage.style.display = 'none';
                form.reset();
                fetchEmployees();
            } catch (error) {
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
                console.error('Error saving employee:', error);
            }
        });
    
        // Initial fetch of employees
        fetchEmployees();
    </script>
    
    </body>
    

</html>
